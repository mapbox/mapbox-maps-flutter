name: mapbox_maps_flutter_examples
description: "Demonstrates how to use the Mapbox Maps Flutter SDK."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  mapbox_maps_flutter:
    path: ../

  cupertino_icons: ^1.0.8
  turf: ^0.0.10
  geolocator: ^13.0.4
  geolocator_android: 4.6.1 # pinned as 4.6.2 doesn't work with our old gradle, safe to unpin after gradle update
  http: ^1.3.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  patrol: ^4.7.0

flutter:
  # Flutter 3.38.x ships Swift Package Manager off by default (default-on lands
  # in 3.44). Opt in per-project so the iOS build uses SPM — which the Patrol
  # RunnerUITests target requires (it links FlutterGeneratedPluginSwiftPackage)
  # — regardless of the machine-global `flutter config` flag or CI step order.
  config:
    enable-swift-package-manager: true
  uses-material-design: true
  assets:
    - assets/
    - assets/symbols/
    - assets/cluster/

# Minimum config patrol_cli requires. The web suite is driven via Playwright
# and does not use these platform blocks; app_name is display-only on web.
patrol:
  app_name: Mapbox Maps Flutter Example
  android:
    package_name: com.mapbox.maps.mapbox_maps_flutter_examples
  ios:
    bundle_id: com.mapbox.maps.FlutterMapsExample
