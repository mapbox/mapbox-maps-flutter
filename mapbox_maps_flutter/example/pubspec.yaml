name: mapbox_maps_flutter_examples
description: "Demonstrates how to use the Mapbox Maps Flutter SDK."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  mapbox_maps_flutter:
    path: ../

  cupertino_icons: ^1.0.8
  turf: ^0.0.10
  geolocator: ^13.0.4
  geolocator_android: 4.6.1 # pinned as 4.6.2 doesn't work with our old gradle, safe to unpin after gradle update
  font_awesome_flutter: ^11.0.0
  http: ^1.3.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/symbols/
    - assets/cluster/
