name: mapbox_maps_flutter_examples
description: "Demonstrates how to use the Mapbox Maps Flutter SDK."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  mapbox_maps_flutter:
    path: ../

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  mapbox_maps_flutter_platform_interface:
    path: ../../mapbox_maps_flutter_platform_interface
  mapbox_maps_flutter_mobile:
    path: ../../mapbox_maps_flutter_mobile
  mapbox_maps_flutter_web:
    path: ../../mapbox_maps_flutter_web